services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
      POSTGRES_DB: axiom_lab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://axiom:axiom@postgres:5432/axiom_lab
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: axiomsecret
      OPENSEARCH_URL: http://opensearch:9200
      S3_ENDPOINT: http://minio:9000
      DEV_AUTH_BYPASS: "true"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - postgres
      - redis
    volumes:
      - ../..:/app

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: celery -A services.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://axiom:axiom@postgres:5432/axiom_lab
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PYTHONPATH: /app:/app/apps/api
    depends_on:
      - postgres
      - redis
    volumes:
      - ../..:/app

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/axiomsecret
    ports:
      - "7474:7474"
      - "7687:7687"

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "9200:9200"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: axiom
      MINIO_ROOT_PASSWORD: axiomsecret
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  pgdata:
